<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكاة جهاز البصمة</title>
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 500px;
            text-align: center;
        }
        h1 {
            color: #2a5298;
            border-bottom: 3px solid #2a5298;
            display: inline-block;
            padding-bottom: 5px;
        }
        .badge {
            background: #ff9800;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin: 15px auto;
            display: inline-block;
        }
        .input-group {
            margin: 20px 0;
            text-align: right;
        }
        label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            transition: 0.3s;
        }
        button:hover {
            background: #1e3c72;
            transform: scale(1.02);
        }
        .data-log {
            background: #f4f4f4;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: right;
            max-height: 250px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-entry {
            border-bottom: 1px solid #ddd;
            padding: 8px;
            font-family: monospace;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📟 محاكاة جهاز البصمة</h1>
        <div class="badge">يرسل بيانات حضور وهمية عبر الشبكة</div>
        
        <div class="input-group">
            <label>🌐 عنوان IP للجهاز المستقبل (Management System)</label>
            <input type="text" id="targetIp" placeholder="مثال: 192.168.1.100" value="127.0.0.1">
        </div>
        <div class="input-group">
            <label>🔌 المنفذ (Port)</label>
            <input type="number" id="targetPort" placeholder="مثال: 3000" value="8080">
        </div>

        <div>
            <button id="sendSingleBtn">➕ إرسال بصمة موظف عشوائي</button>
            <button id="startAutoBtn">🔄 بدء الإرسال التلقائي (كل 5 ثوان)</button>
            <button id="stopAutoBtn">⏹️ إيقاف الإرسال</button>
        </div>

        <div class="data-log">
            <strong>📋 سجل الإرسال:</strong>
            <div id="logContainer"></div>
        </div>
    </div>

    <script>
        // بيانات موظفين وهمية
        const employees = [
            { id: 101, name: "أحمد محمد" },
            { id: 102, name: "سارة علي" },
            { id: 103, name: "محمد عبدالله" },
            { id: 104, name: "نورة خالد" },
            { id: 105, name: "خالد إبراهيم" }
        ];

        let autoInterval = null;

        function getRandomEmployee() {
            const emp = employees[Math.floor(Math.random() * employees.length)];
            const now = new Date();
            return {
                employeeId: emp.id,
                name: emp.name,
                timestamp: now.toISOString(),
                timeFormatted: now.toLocaleTimeString('ar-EG'),
                dateFormatted: now.toLocaleDateString('ar-EG'),
                type: "بصمة حضور"
            };
        }

        async function sendAttendance(data, ip, port) {
            // بناء عنوان URL الحقيقي (لاحظ: لأسباب أمنية في المتصفح، ستحتاج لسيرفر وسيط لتجاوز CORS)
            const url = `http://${ip}:${port}/api/attendance`;
            
            // إضافة سجل في الواجهة
            const logDiv = document.getElementById('logContainer');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `📤 إرسال: ${data.name} (${data.employeeId}) الساعة ${data.timeFormatted} إلى ${ip}:${port} ... `;
            logDiv.prepend(logEntry);

            try {
                // محاكاة حقيقية للإرسال - لكن المتصفح سيمنع الوصول لـ CORS ما لم يكن السيرفر يسمح
                // لحل هذا تجريبياً، سنستخدم fetch مع no-cors (لن يعطي رد لكن يظهر المحاولة)
                // أو الأفضل: سنستخدم خدمة وهمية مؤقتة أو توثيق أن هذا هو الكود الحقيقي.
                
                // هذه محاولة حقيقية: 
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    logEntry.innerHTML += `<span class="success">✅ تم الإرسال بنجاح</span>`;
                } else {
                    logEntry.innerHTML += `<span class="error">❌ فشل: ${response.status}</span>`;
                }
            } catch (error) {
                logEntry.innerHTML += `<span class="error">⚠️ خطأ في الاتصال: ${error.message} (تأكد من أن برنامج الإدارة يعمل على هذا IP والمنفذ)</span>`;
                console.error(error);
            }

            // إضافة سكرول للأسفل
            logDiv.scrollTop = 0;
        }

        // إرسال باستخدام LocalStorage بديل (للتجربة بدون CORS) - لتوضيح الفكرة فقط
        // طريقة بديلة للتواصل بين البرنامجين على نفس الجهاز: استخدام localStorage
        function sendViaLocalStorage(data, ip, port) {
            const logDiv = document.getElementById('logContainer');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            
            // تخزين البيانات في localStorage لمحاكاة استقبال برنامج الإدارة
            const key = `attendance_${Date.now()}`;
            const attendanceEvent = {
                ...data,
                sourceIp: ip,
                sourcePort: port,
                receivedAt: new Date().toISOString()
            };
            localStorage.setItem(key, JSON.stringify(attendanceEvent));
            logEntry.innerHTML = `💾 تخزين محلي: تم إرسال بصمة ${data.name} إلى localStorage (محاكاة الشبكة) -> يمكن لبرنامج الإدارة سحبها.`;
            logDiv.prepend(logEntry);
            logDiv.scrollTop = 0;
            
            // أيضًا تشغيل حدث مخصص لبرنامج الإدارة إذا كان مفتوحاً
            window.dispatchEvent(new CustomEvent('attendanceDataSent', { detail: attendanceEvent }));
        }

        // دمج الطريقتين: محاولة فعلية + تخزين محلي لضمان عمل العرض
        async function handleSend() {
            const ip = document.getElementById('targetIp').value;
            const port = document.getElementById('targetPort').value;
            const employeeData = getRandomEmployee();
            
            // محاولة الإرسال الحقيقية
            await sendAttendance(employeeData, ip, port);
            // أيضاً نرسل عبر localStorage لضمان عمل برنامج الإدارة في نفس المتصفح
            sendViaLocalStorage(employeeData, ip, port);
        }

        document.getElementById('sendSingleBtn').addEventListener('click', handleSend);
        
        document.getElementById('startAutoBtn').addEventListener('click', () => {
            if (autoInterval) clearInterval(autoInterval);
            autoInterval = setInterval(handleSend, 5000);
            alert("✅ بدأ الإرسال التلقائي كل 5 ثوانٍ");
        });
        
        document.getElementById('stopAutoBtn').addEventListener('click', () => {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
                alert("⏹️ تم إيقاف الإرسال التلقائي");
            }
        });
    </script>
</body>
</html>
