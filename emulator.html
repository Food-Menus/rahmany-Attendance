<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكاة جهاز البصمة - نسخة الشبكة</title>
    <style>
        * { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 550px;
        }
        h1 { color: #764ba2; text-align: center; }
        .badge {
            background: #ff9800;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin: 15px auto;
            display: inline-block;
            width: fit-content;
        }
        .input-group { margin: 20px 0; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #333; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background: #764ba2;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            transition: 0.3s;
        }
        button:hover { background: #667eea; transform: scale(1.02); }
        .log {
            background: #f4f4f4;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-entry { border-bottom: 1px solid #ddd; padding: 8px; margin: 5px 0; }
        .success { color: green; font-weight: bold; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📟 محاكاة جهاز البصمة</h1>
        <div style="text-align: center;">
            <div class="badge">🌐 يعمل عبر الشبكة المحلية</div>
        </div>
        
        <div class="input-group">
            <label>🌐 عنوان IP للسيرفر (الجهاز الذي يعمل عليه server.js)</label>
            <input type="text" id="serverIp" placeholder="مثال: 192.168.1.100" value="localhost">
            <small style="color: #666;">📍 استخدم localhost إذا كان السيرفر على نفس الجهاز، أو الـ IP الحقيقي (مثل 192.168.1.100)</small>
        </div>
        <div class="input-group">
            <label>🔌 منفذ السيرفر</label>
            <input type="number" id="serverPort" value="3000">
        </div>
        
        <div class="input-group">
            <label>👤 اختيار موظف</label>
            <select id="employeeSelect">
                <option value="101|أحمد محمد">أحمد محمد (101)</option>
                <option value="102|سارة علي">سارة علي (102)</option>
                <option value="103|محمد عبدالله">محمد عبدالله (103)</option>
                <option value="104|نورة خالد">نورة خالد (104)</option>
                <option value="105|خالد إبراهيم">خالد إبراهيم (105)</option>
            </select>
        </div>

        <div style="text-align: center;">
            <button id="sendBtn">➕ إرسال بصمة الحضور</button>
            <button id="autoStartBtn">🔄 إرسال تلقائي (كل 5 ثوان)</button>
            <button id="autoStopBtn">⏹️ إيقاف</button>
        </div>

        <div class="log">
            <strong>📋 سجل الإرسال:</strong>
            <div id="logContainer"></div>
        </div>
    </div>

    <script>
        let autoInterval = null;
        
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString('ar-EG');
            entry.innerHTML = `[${time}] <span class="${type}">${message}</span>`;
            logDiv.prepend(entry);
            if (logDiv.children.length > 50) logDiv.removeChild(logDiv.lastChild);
        }
        
        async function sendAttendance() {
            const serverIp = document.getElementById('serverIp').value;
            const serverPort = document.getElementById('serverPort').value;
            const employeeSelect = document.getElementById('employeeSelect');
            const [id, name] = employeeSelect.value.split('|');
            
            const attendanceData = {
                employeeId: parseInt(id),
                name: name,
                timestamp: new Date().toISOString(),
                timeFormatted: new Date().toLocaleTimeString('ar-EG'),
                dateFormatted: new Date().toLocaleDateString('ar-EG'),
                type: "بصمة حضور",
                deviceIp: window.location.hostname || "unknown"
            };
            
            const url = `http://${serverIp}:${serverPort}/api/attendance`;
            addLog(`📤 جاري إرسال بصمة ${name} إلى ${url}...`, 'info');
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(attendanceData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    addLog(`✅ تم إرسال بصمة ${name} بنجاح! (${result.message})`, 'success');
                } else {
                    addLog(`❌ فشل الإرسال: ${response.status} ${response.statusText}`, 'error');
                }
            } catch (error) {
                addLog(`⚠️ خطأ في الاتصال: ${error.message}. تأكد من أن السيرفر يعمل على ${serverIp}:${serverPort}`, 'error');
            }
        }
        
        document.getElementById('sendBtn').addEventListener('click', sendAttendance);
        
        document.getElementById('autoStartBtn').addEventListener('click', () => {
            if (autoInterval) clearInterval(autoInterval);
            autoInterval = setInterval(sendAttendance, 5000);
            addLog('🔄 بدأ الإرسال التلقائي (كل 5 ثوانٍ)', 'success');
        });
        
        document.getElementById('autoStopBtn').addEventListener('click', () => {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
                addLog('⏹️ تم إيقاف الإرسال التلقائي', 'info');
            }
        });
    </script>
</body>
</html>
