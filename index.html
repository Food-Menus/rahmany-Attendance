<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامج إدارة الحضور والانصراف - لوحة التحكم السحابية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid #2c3e50; }
        h2 { margin-top: 0; color: #2c3e50; }
        .search-box { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #666; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { background-color: #27ae60; color: white; border: none; padding: 11px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #219653; }
        .status-bar { margin-top: 15px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
        .status-loading { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #333; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-in { background-color: #e3f2fd; color: #0d47a1; }
        .badge-out { background-color: #ffebee; color: #b71c1c; }
        .empty-row { text-align: center; color: #999; padding: 30px; }
    </style>
</head>
<body>

<div class="container">
    <!-- كارت الاتصال بالشبكة -->
    <div class="card">
        <h2>🖥️ نظام Attendance Management (لوحة التحكم السحابية)</h2>
        <p style="color: #7f8c8d; font-size: 14px; margin-top: -5px;">قم بسحب حركات الموظفين المرفوعة أونلاين من أجهزة البصمة.</p>
        
        <div class="search-box">
            <div class="input-group">
                <label>أدخل عنوان الـ IP للجهاز المُراد سحبه</label>
                <input type="text" id="searchIp" value="192.168.1.150">
            </div>
            <div class="input-group">
                <label>رقم المنفذ (Port)</label>
                <input type="number" id="searchPort" value="4370">
            </div>
            <button id="fetchBtn">اتصال وسحب البيانات الحية</button>
        </div>

        <div id="statusBar" class="status-bar"></div>
    </div>

    <!-- كارت عرض جدول البيانات -->
    <div class="card">
        <h3 style="margin-top: 0; color: #34495e;">📊 سجل حركات الحضور والانصراف المسحوبة أونلاين</h3>
        <table>
            <thead>
                <tr>
                    <th>كود الموظف ID</th>
                    <th>اسم الموظف</th>
                    <th>وقت تسجيل البصمة</th>
                    <th>نوع الحركة</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="4" class="empty-row">لا توجد بيانات حالياً، فضلاً أدخل الإعدادات واضغط على سحب البيانات.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('fetchBtn').addEventListener('click', function() {
        const ip = document.getElementById('searchIp').value.trim();
        const port = document.getElementById('searchPort').value.trim();
        const statusBar = document.getElementById('statusBar');
        const tableBody = document.getElementById('tableBody');

        if(!ip || !port) {
            alert("يرجى إدخال البيانات كاملة!");
            return;
        }

        // 1. تشغيل حالة التحميل
        statusBar.style.display = "block";
        statusBar.className = "status-bar status-loading";
        statusBar.innerText = `جاري الاتصال بالسيرفر السحابي والتحقق من حركات الجهاز ${ip}:${port}...`;
        tableBody.innerHTML = `<tr><td colspan="4" class="empty-row">جاري مزامنة السجلات ومطابقتها...</td></tr>`;

        // 2. جلب البيانات من Firebase مباشرة بدلاً من LocalStorage
        fetch('https://fingerprint-demo-default-rtdb.firebaseio.com/logs.json')
        .then(res => res.json())
        .then(data => {
            // تحويل الـ Object القادم من Firebase إلى Array لسهولة الفلترة
            const allLogs = data ? Object.keys(data).map(key => data[key]) : [];
            
            // فلترة البيانات بناءً على الـ IP والبورت المكتوبين لتظهر حركات هذا الجهاز فقط
            const filteredLogs = allLogs.filter(log => log.targetIp === ip && log.targetPort === port);

            if(filteredLogs.length === 0) {
                statusBar.className = "status-bar status-loading";
                statusBar.innerText = `تم الاتصال بنجاح، ولكن لم يتم العثور على أي حركات بصمة مسجلة للعنوان ${ip}:${port} اليوم.`;
                tableBody.innerHTML = `<tr><td colspan="4" class="empty-row">جهاز البصمة لا يحتوي على سجلات جديدة متوافقة مع هذا العنوان.</td></tr>`;
                return;
            }

            // 3. عرض البيانات بنجاح في حالة التطابق
            statusBar.className = "status-bar status-success";
            statusBar.innerText = `تم الاتصال بنجاح! تم العثور وسحب عدد (${filteredLogs.length}) حركة بصمة من السيرفر السحابي.`;
            
            tableBody.innerHTML = ""; // تنظيف الجدول قبل الحقن
            
            // ترتيب الحركات من الأحدث للأقدم وعرضهم في الجدول
            filteredLogs.reverse().forEach(log => {
                const tr = document.createElement('tr');
                const badgeClass = log.status === "حضور" ? "badge badge-in" : "badge badge-out";
                
                tr.innerHTML = `
                    <td><strong>#${log.id}</strong></td>
                    <td>${log.name}</td>
                    <td>${log.time}</td>
                    <td><span class="${badgeClass}">${log.status}</span></td>
                `;
                tableBody.appendChild(tr);
            });
        })
        .catch(err => {
            statusBar.className = "status-bar";
            statusBar.style.backgroundColor = "#f8d7da";
            statusBar.style.color = "#721c24";
            statusBar.innerText = "فشل الاتصال بالسيرفر السحابي، تأكد من اتصال الإنترنت لديك.";
            tableBody.innerHTML = `<tr><td colspan="4" class="empty-row" style="color: #721c24;">خطأ في الشبكة أثناء جلب البيانات.</td></tr>`;
        });
    });
</script>

</body>
</html>
