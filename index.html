<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة مراقبة بصمات أجهزة ZK</title>
    <style>
        body { font-family: Tahoma, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status { padding: 8px; font-weight: bold; display: inline-block; margin-bottom: 15px; border-radius: 4px; }
        .connected { background-color: #2ecc71; color: white; }
        .disconnected { background-color: #e74c3c; color: white; }
        
        /* إعدادات صندوق الاتصال */
        .config-box { background: #fff; padding: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        .config-box input { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; width: 200px; text-align: left; direction: ltr; }
        .config-box button { padding: 8px 15px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .config-box button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <h2>مراقبة حزم الحضور الثنائية (Port 4370) مباشرة</h2>
    
    <!-- صندوق إدخال الـ IP لتسهيل الاتصال من الهاتف -->
    <div class="config-box">
        <label for="server-ip">عنوان IP جهاز الكمبيوتر (السيرفر):</label>
        <input type="text" id="server-ip" value="192.168.1.15" placeholder="مثال: 192.168.1.15">
        <button onclick="connectToServer()">اتصـال</button>
    </div>

    <div id="status" class="status disconnected">غير متصل. أدخل IP السيرفر واضغط اتصال.</div>

    <table>
        <thead>
            <tr>
                <th>رقم الموظف (User ID)</th>
                <th>وقت البصمة (Timestamp)</th>
                <th>عنوان الجهاز المتصل (IP)</th>
                <th>بورت الجهاز</th>
            </tr>
        </thead>
        <tbody id="log-table">
            <!-- سيتم إضافة البيانات هنا ديناميكياً -->
        </tbody>
    </table>

    <script>
        const statusDiv = document.getElementById('status');
        const tableBody = document.getElementById('log-table');
        const ipInput = document.getElementById('server-ip');
        let ws = null;

        // محاولة جلب آخر IP تم استخدامه لتوفير الوقت
        if (localStorage.getItem('savedPrivateKeyIp')) {
            ipInput.value = localStorage.getItem('savedPrivateKeyIp');
        }

        function connectToServer() {
            const ip = ipInput.value.trim();
            if (!ip) {
                alert('الرجاء إدخال عنوان IP صحيح');
                return;
            }

            // حفظ الـ IP في المتصفح لكي لا تكتبه في كل مرة تفتح الهاتف
            localStorage.setItem('savedPrivateKeyIp', ip);

            // إغلاق أي اتصال قديم لو وجد
            if (ws) {
                ws.close();
            }

            statusDiv.textContent = 'جاري الاتصال بالسيرفر...';
            statusDiv.className = 'status disconnected';

            // الاتصال بالسيرفر عبر الـ IP المدخل وبورت الـ WebSocket 8080
            ws = new WebSocket(`ws://${ip}:8080`);

            ws.onopen = () => {
                statusDiv.textContent = `متصل بنجاح بالسيرفر (${ip}) وظيفة الـ UDP تعمل`;
                statusDiv.className = 'status connected';
            };

            ws.onclose = () => {
                statusDiv.textContent = 'انقطع الاتصال بالسيرفر. تأكد من تشغيل server.js ومن الـ IP';
                statusDiv.className = 'status disconnected';
            };

            ws.onerror = (error) => {
                console.error('WebSocket Error:', error);
                statusDiv.textContent = 'فشل الاتصال. تأكد أن الهاتف والكمبيوتر على نفس الشبكة، وأن الفايروال يسمح بالبورت 8080';
                statusDiv.className = 'status disconnected';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // إنشاء سطر جديد في الجدول
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${data.userId}</strong></td>
                    <td>${data.timestamp}</td>
                    <td>${data.ip}</td>
                    <td>${data.port}</td>
                `;
                
                // إضافة السطر في أول الجدول ليظهر الأحدث دائماً في الأعلى
                tableBody.insertBefore(row, tableBody.firstChild);
            };
        }

        // تشغيل الاتصال تلقائياً عند فتح الصفحة بناءً على الـ IP الموجود في الصندوق
        window.onload = () => {
            connectToServer();
        };
    </script>
</body>
</html>
