<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الحضور - نسخة الشبكة</title>
    <style>
        * { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        h1 { color: #764ba2; text-align: center; }
        .config-panel {
            background: #f7f7f7;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .input-group { flex: 1; min-width: 150px; }
        label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button {
            background: #764ba2;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            height: 42px;
        }
        button:hover { background: #667eea; transform: scale(1.02); }
        .fetch-btn { background: #27ae60; }
        .fetch-btn:hover { background: #2ecc71; }
        .clear-btn { background: #e74c3c; }
        .clear-btn:hover { background: #c0392b; }
        .status {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }
        .status.error { background: #f8d7da; color: #721c24; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #764ba2;
            color: white;
        }
        tr:nth-child(even) { background: #f9f9f9; }
        .auto-refresh {
            margin-top: 10px;
            text-align: center;
        }
        .stats {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 نظام إدارة الحضور (سحب البصمات)</h1>
        
        <div class="config-panel">
            <div class="input-group">
                <label>🌐 عنوان IP لسيرفر البصمة</label>
                <input type="text" id="serverIp" value="localhost" placeholder="مثال: 192.168.1.100">
                <small>📍 نفس IP الذي يعمل عليه server.js</small>
            </div>
            <div class="input-group">
                <label>🔌 منفذ السيرفر</label>
                <input type="number" id="serverPort" value="3000">
            </div>
            <button id="fetchBtn" class="fetch-btn">🔄 سحب البصمات الآن</button>
            <button id="clearAllBtn" class="clear-btn">🗑️ مسح كل البصمات</button>
        </div>

        <div id="statusMsg" class="status">✅ النظام جاهز - اضغط "سحب البصمات"</div>

        <div class="auto-refresh">
            <label>
                <input type="checkbox" id="autoRefreshCheckbox"> التحديث التلقائي كل 5 ثوانٍ
            </label>
        </div>

        <div class="stats" id="stats">
            📈 إحصائيات: 0 بصمة مسجلة
        </div>

        <div style="overflow-x: auto;">
            <table id="attendanceTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>رقم الموظف</th>
                        <th>الاسم</th>
                        <th>نوع العملية</th>
                        <th>التاريخ</th>
                        <th>الوقت</th>
                        <th>جهاز البصمة</th>
                        <th>وقت الاستلام</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8" style="text-align:center;">لا توجد بيانات - اضغط "سحب البصمات"</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        
        async function fetchAttendance() {
            const serverIp = document.getElementById('serverIp').value;
            const serverPort = document.getElementById('serverPort').value;
            const url = `http://${serverIp}:${serverPort}/api/attendance`;
            
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.className = 'status';
            statusDiv.innerHTML = `⏳ جاري سحب البيانات من ${serverIp}:${serverPort}...`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                if (data.success && data.records) {
                    renderTable(data.records);
                    statusDiv.innerHTML = `✅ تم سحب ${data.records.length} بصمة بنجاح`;
                    statusDiv.className = 'status';
                } else {
                    throw new Error('بيانات غير صالحة');
                }
            } catch (error) {
                statusDiv.innerHTML = `⚠️ خطأ في الاتصال: ${error.message}. تأكد من أن السيرفر يعمل على ${serverIp}:${serverPort}`;
                statusDiv.className = 'status error';
                console.error(error);
            }
        }
        
        function renderTable(records) {
            const tbody = document.getElementById('tableBody');
            const statsDiv = document.getElementById('stats');
            
            if (!records || records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد بصمات مسجلة</td></tr>';
                statsDiv.innerHTML = '📈 إحصائيات: 0 بصمة مسجلة';
                return;
            }
            
            tbody.innerHTML = records.map((rec, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${rec.employeeId}</td>
                    <td>${rec.name}</td>
                    <td>${rec.type || 'بصمة حضور'}</td>
                    <td>${new Date(rec.timestamp).toLocaleDateString('ar-EG')}</td>
                    <td>${new Date(rec.timestamp).toLocaleTimeString('ar-EG')}</td>
                    <td>${rec.deviceIp || 'غير معروف'}</td>
                    <td>${new Date(rec.receivedAt).toLocaleTimeString('ar-EG')}</td>
                </tr>
            `).join('');
            
            statsDiv.innerHTML = `📈 إحصائيات: ${records.length} بصمة مسجلة`;
        }
        
        async function clearAllAttendance() {
            const serverIp = document.getElementById('serverIp').value;
            const serverPort = document.getElementById('serverPort').value;
            const url = `http://${serverIp}:${serverPort}/api/attendance`;
            
            if (!confirm('⚠️ هل أنت متأكد من مسح كل البصمات؟')) return;
            
            try {
                const response = await fetch(url, { method: 'DELETE' });
                if (response.ok) {
                    document.getElementById('statusMsg').innerHTML = '🗑️ تم مسح جميع البصمات بنجاح';
                    await fetchAttendance(); // تحديث الجدول
                } else {
                    throw new Error('فشل المسح');
                }
            } catch (error) {
                document.getElementById('statusMsg').innerHTML = `❌ خطأ في المسح: ${error.message}`;
                document.getElementById('statusMsg').className = 'status error';
            }
        }
        
        // التحكم في التحديث التلقائي
        document.getElementById('autoRefreshCheckbox').addEventListener('change', (e) => {
            if (e.target.checked) {
                if (autoRefreshInterval) clearInterval(autoRefreshInterval);
                autoRefreshInterval = setInterval(fetchAttendance, 5000);
                document.getElementById('statusMsg').innerHTML = '🔄 التحديث التلقائي مفعل (كل 5 ثوانٍ)';
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                    document.getElementById('statusMsg').innerHTML = '⏹️ تم إيقاف التحديث التلقائي';
                }
            }
        });
        
        document.getElementById('fetchBtn').addEventListener('click', fetchAttendance);
        document.getElementById('clearAllBtn').addEventListener('click', clearAllAttendance);
        
        // تحميل أولي للبيانات
        fetchAttendance();
    </script>
</body>
</html>
