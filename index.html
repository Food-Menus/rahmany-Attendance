<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامج إدارة الحضور والانصراف - محلي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid #2c3e50; }
        h2 { margin-top: 0; color: #2c3e50; }
        .search-box { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #666; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { background-color: #27ae60; color: white; border: none; padding: 11px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #219653; }
        .status-bar { margin-top: 15px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
        .status-loading { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #333; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-in { background-color: #e3f2fd; color: #0d47a1; }
        .badge-out { background-color: #ffebee; color: #b71c1c; }
        .empty-row { text-align: center; color: #999; padding: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🖥️ نظام Attendance Management (سحب محلي مباشر 📡)</h2>
        <p style="color: #7f8c8d; font-size: 14px; margin-top: -5px;">اضغط "سحب" لجلب البصمات المخزنة، أو تابع الجدول مباشرة عند الضغط من التاب الأخرى.</p>
        
        <div class="search-box">
            <div class="input-group">
                <label>عنوان الـ IP المراد سحبه</label>
                <input type="text" id="searchIp" value="192.168.1.150">
            </div>
            <div class="input-group">
                <label>رقم المنفذ (Port)</label>
                <input type="number" id="searchPort" value="4370">
            </div>
            <button id="fetchBtn">سحب البصمات الآن</button>
        </div>

        <div id="statusBar" class="status-bar"></div>
    </div>

    <div class="card">
        <h3 style="margin-top: 0; color: #34495e;">📊 سجل البصمات المستلمة (تحديث فوري)</h3>
        <table>
            <thead>
                <tr>
                    <th>كود الموظف ID</th>
                    <th>اسم الموظف</th>
                    <th>وقت تسجيل البصمة</th>
                    <th>نوع الحركة</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="4" class="empty-row">لا توجد بيانات مسحوبة. اضغط سحب أو أرسل بصمات جديدة من التاب الأخرى.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const statusBar = document.getElementById('statusBar');
    const tableBody = document.getElementById('tableBody');

    // الدالة المسؤولة عن عرض وتحديث الجدول
    function renderLogs() {
        const ip = document.getElementById('searchIp').value.trim();
        const port = document.getElementById('searchPort').value.trim();

        // قراءة كل البصمات المخزنة في المتصفح
        const allLogs = JSON.parse(localStorage.getItem('fingerprint_db')) || [];
        
        // فلترة البصمات حسب الـ IP والـ Port المكتوبين
        const filteredLogs = allLogs.filter(log => log.targetIp === ip && log.targetPort === port);

        statusBar.style.display = "block";

        if(filteredLogs.length === 0) {
            statusBar.className = "status-bar status-loading";
            statusBar.innerText = `لم يتم العثور على بصمات تطابق العنوان ${ip}:${port}`;
            tableBody.innerHTML = `<tr><td colspan="4" class="empty-row">لا توجد بصمات متطابقة. جرب إرسال بصمة من التاب الأخرى أولاً بنفس الأرقام.</td></tr>`;
            return;
        }

        statusBar.className = "status-bar status-success";
        statusBar.innerText = `تم بنجاح! تم مزامنة وسحب (${filteredLogs.length}) حركة بصمة محلياً بنجاح.`;
        
        tableBody.innerHTML = "";
        // عرض الأحدث فوق
        [...filteredLogs].reverse().forEach(log => {
            const tr = document.createElement('tr');
            const badgeClass = log.status === "حضور" ? "badge badge-in" : "badge badge-out";
            
            tr.innerHTML = `
                <td><strong>#${log.id}</strong></td>
                <td>${log.name}</td>
                <td>${log.time}</td>
                <td><span class="${badgeClass}">${log.status}</span></td>
            `;
            tableBody.appendChild(tr);
        });
    }

    // زر السحب التقليدي
    document.getElementById('fetchBtn').addEventListener('click', renderLogs);

    // [الماجيك الحقيقي]: الاستماع لقناة البث المحلية
    const fingerprintChannel = new BroadcastChannel('fingerprint_channel');
    fingerprintChannel.onmessage = function(event) {
        // بمجرد ما يجيلنا إشعار إن التاب التانية بعتت بصمة، بنحدث الجدول تلقائياً في نفس اللحظة!
        renderLogs();
    };
</script>

</body>
</html>
