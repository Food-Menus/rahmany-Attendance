<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة مراقبة بصمات أجهزة ZK</title>
    <style>
        body { font-family: Tahoma, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status { padding: 8px; font-weight: bold; display: inline-block; margin-bottom: 15px; border-radius: 4px; }
        .connected { background-color: #2ecc71; color: white; }
        .disconnected { background-color: #e74c3c; color: white; }
        
        /* إعدادات صندوق الاتصال المرن */
        .config-box { background: #fff; padding: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        .input-group { display: flex; align-items: center; gap: 8px; }
        .config-box input { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; text-align: left; direction: ltr; }
        #server-ip { width: 180px; }
        #server-port { width: 80px; }
        .config-box button { padding: 8px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .config-box button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <h2>مراقبة حزم الحضور الثنائية مباشرة</h2>
    
    <!-- صندوق الإعدادات لتحديد الـ IP والبورت -->
    <div class="config-box">
        <div class="input-group">
            <label for="server-ip">عنوان الـ IP:</label>
            <input type="text" id="server-ip" value="192.168.1.15" placeholder="مثال: 192.168.1.15">
        </div>
        
        <div class="input-group">
            <label for="server-port">البورت (Port):</label>
            <input type="text" id="server-port" value="8080" placeholder="8080">
        </div>
        
        <button onclick="connectToServer()">اتصـال مباكـشر</button>
    </div>

    <div id="status" class="status disconnected">غير متصل. حدد البيانات واضغط اتصال.</div>

    <table>
        <thead>
            <tr>
                <th>رقم الموظف (User ID)</th>
                <th>وقت البصمة (Timestamp)</th>
                <th>عنوان الجهاز المتصل (IP)</th>
                <th>بورت الجهاز</th>
            </tr>
        </thead>
        <tbody id="log-table">
            <!-- البيانات تتدفق هنا -->
        </tbody>
    </table>

    <script>
        const statusDiv = document.getElementById('status');
        const tableBody = document.getElementById('log-table');
        const ipInput = document.getElementById('server-ip');
        const portInput = document.getElementById('server-port');
        let ws = null;

        // استرجاع الإعدادات المحفوظة سابقاً إن وجدت
        if (localStorage.getItem('zk_saved_ip')) {
            ipInput.value = localStorage.getItem('zk_saved_ip');
        }
        if (localStorage.getItem('zk_saved_port')) {
            portInput.value = localStorage.getItem('zk_saved_port');
        }

        function connectToServer() {
            const ip = ipInput.value.trim();
            const port = portInput.value.trim();
            
            if (!ip || !port) {
                alert('الرجاء إدخال الـ IP والبورت بشكل صحيح');
                return;
            }

            // حفظ البيانات محلياً في المتصفح لتسهيل المرات القادمة
            localStorage.setItem('zk_saved_ip', ip);
            localStorage.setItem('zk_saved_port', port);

            // إنهاء الاتصال النشط حالياً قبل بدء اتصال جديد
            if (ws) {
                ws.close();
            }

            statusDiv.textContent = 'جاري الاتصال بالسيرفر...';
            statusDiv.className = 'status disconnected';

            // إنشاء اتصال الـ WebSocket الديناميكي بالكامل
            ws = new WebSocket(`ws://${ip}:${port}`);

            ws.onopen = () => {
                statusDiv.textContent = `متصل بنجاح بالخادم عبر الرابط الأساسي ws://${ip}:${port}`;
                statusDiv.className = 'status connected';
            };

            ws.onclose = () => {
                statusDiv.textContent = 'انقطع الاتصال. تأكد من تشغيل ملف Node.js ومن صحة الـ IP والبورت المكتوبين';
                statusDiv.className = 'status disconnected';
            };

            ws.onerror = (error) => {
                console.error('WebSocket Error:', error);
                statusDiv.textContent = 'فشل الاتصال. تحقق من جدار الحماية (Firewall) في الكمبيوتر أو إعدادات الشبكة';
                statusDiv.className = 'status disconnected';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${data.userId}</strong></td>
                    <td>${data.timestamp}</td>
                    <td>${data.ip}</td>
                    <td>${data.port}</td>
                `;
                
                tableBody.insertBefore(row, tableBody.firstChild);
            };
        }

        // بدء محاولة الاتصال التلقائي فور تحميل الصفحة بالإعدادات الافتراضية/المحفوظة
        window.onload = () => {
            connectToServer();
        };
    </script>
</body>
</html>
