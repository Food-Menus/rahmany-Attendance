<!-- index.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة مراقبة بصمات أجهزة ZK</title>
    <style>
        body { font-family: Tahoma, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status { padding: 8px; font-weight: bold; display: inline-block; margin-bottom: 15px; border-radius: 4px; }
        .connected { background-color: #2ecc71; color: white; }
        .disconnected { background-color: #e74c3c; color: white; }
    </style>
</head>
<body>

    <h2>مراقبة حزم الحضور الثنائية (Port 4370) مباشرة</h2>
    <div id="status" class="status disconnected">جاري الاتصال بالسيرفر...</div>

    <table>
        <thead>
            <tr>
                <th>رقم الموظف (User ID)</th>
                <th>وقت البصمة (Timestamp)</th>
                <th>عنوان الجهاز المتصل (IP)</th>
                <th>بورت الجهاز</th>
            </tr>
        </thead>
        <tbody id="log-table">
            <!-- سيتم إضافة البيانات هنا ديناميكياً -->
        </tbody>
    </table>

    <script>
        const statusDiv = document.getElementById('status');
        const tableBody = document.getElementById('log-table');

        // الاتصال بخادم الـ WebSocket
        const ws = new WebSocket('ws://localhost:8080');

        ws.onopen = () => {
            statusDiv.textContent = 'متصل بالسيرفر ونظام الـ UDP يعمل';
            statusDiv.className = 'status connected';
        };

        ws.onclose = () => {
            statusDiv.textContent = 'انقطع الاتصال بالسيرفر';
            statusDiv.className = 'status disconnected';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // إنشاء سطر جديد في الجدول
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${data.userId}</strong></td>
                <td>${data.timestamp}</td>
                <td>${data.ip}</td>
                <td>${data.port}</td>
            `;
            
            // إضافة السطر في أول الجدول ليظهر الأحدث دائماً في الأعلى
            tableBody.insertBefore(row, tableBody.firstChild);
        };
    </script>
</body>
</html>
