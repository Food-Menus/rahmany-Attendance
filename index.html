<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير حركات البصمة</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        h1 { color: #333; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 4px; }
        button:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h1>تقرير حضور وانصراف الموظفين</h1>
    <button onclick="fetchAttendance()">سحب البيانات الآن</button>

    <table id="attendanceTable">
        <thead>
            <tr>
                <th>رقم الموظف (User ID)</th>
                <th>وقت وتاريخ البصمة (Date & Time)</th>
            </tr>
        </thead>
        <tbody>
            <!-- البيانات هتنزل هنا بالـ JS -->
        </tbody>
    </table>

    <script>
        async function fetchAttendance() {
            const tbody = document.querySelector('#attendanceTable tbody');
            tbody.innerHTML = '<tr><td colspan="2">جاري سحب البيانات من الجهاز...</td></tr>';

            try {
                const response = await fetch('http://localhost:5000/api/attendance');
                const result = await response.json();

                // 🛠️ سطر استكشافي: افتح الـ Console في المتصفح (F12) عشان تشوف الداتا الحقيقية اللي راجعة
                console.log("البيانات القادمة من الباك أند:", result);

                if (result.success && result.data && result.data.length > 0) {
                    tbody.innerHTML = ''; 
                    
                    result.data.forEach(log => {
                        // 🛠️ معالجة ذكية لأسماء الحقول (تأخذ أي اسم ترجعه المكتبة)
                        const userId = log.deviceUserId || log.userId || log.uid || "غير معروف";
                        const rawTime = log.recordTime || log.timestamp || log.time;
                        
                        let formattedTime = "بدون تاريخ";
                        if (rawTime) {
                            formattedTime = new Date(rawTime).toLocaleString('ar-EG');
                        }

                        const row = `
                            <tr>
                                <td>${userId}</td>
                                <td>${formattedTime}</td>
                            </tr>
                        `;
                        tbody.insertAdjacentHTML('beforeend', row);
                    });
                } else {
                    // لو المصفوفة رجعت فاضية من الباك أند
                    tbody.innerHTML = `<tr><td colspan="2" style="color:orange;">⚠️ الاتصال ناجح، ولكن المحاكي أرسل سجلات فارغة أو بصيغة غير مدعومة.</td></tr>`;
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="2" style="color:red;">مشكلة في الاتصال بالخادم (Backend)</td></tr>';
            }
        }
    </script>
</body>
</html>
